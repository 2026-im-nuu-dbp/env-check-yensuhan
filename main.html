<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>網頁作業</title>
</head>
<body>
    <header>
        <div class="logo">
            <img src="https://wp.technologyreview.com/wp-content/uploads/2023/11/AI-energyimpact1b.jpg?fit=1456,818" alt="logo" width="750" height="150">
        </div>
            
        <h1>網頁作業</h1>
        <h2>我的作品集</h2>
        <nav>
            <ul>
                <li><a href="#main">首頁</a></li>
                <li><a href="#about">關於我</a></li>
                <li><a href="#portfolio">作品集</a></li>
                <li><a href="#contact">聯絡我</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="main">
            <h3>歡迎來到我的作品集</h3>
            <p>這裡展示了我過去的專案和作品，請隨意瀏覽！</p>
            <a href="#contact" class="btn">聯絡我</a>
        </section>
        <section id="about">
            <h3>關於我</h3>
            <div class="about-flex">
                <div class="about-photo">
                    <img src="https://avatars.githubusercontent.com/u/122863583?v=4" alt="Profile Picture" width="200" height="200">
                </div>
                <div class="about-context">
                    <p>我是顏書崡，一名熱愛睡覺的睡覺者。</p>
                </div>
            </div>
        </section>

        <section id="portfolio">
            <h3>作品集</h3>
            <p>作品展出</p>
            <div class="card-container">
                <div class="card">
                    <img src="https://via.placeholder.com/300x200" alt="Project 1">
                    <h4>專案一</h4>
                    <p>你好。</p>
                </div>
                <div class="card">
                    <img src="https://via.placeholder.com/300x200" alt="Project 2">
                    <h4>專案二</h4>
                    <p>搭拉公主。</p>
                </div>
                <div class="card">
                    <img src="https://via.placeholder.com/300x200" alt="Project 3">
                    <h4>專案三</h4>
                    <p>多拉A夢。</p>
                </div>
            </div>
        </section>
        <section id="contact">
            <h3>聯絡我</h3>
            <p>Email: example@email.com</p>
        </section>
        </section>
        <footer>
            <p>&copy; 2026 我的作品集. All rights reserved.</p>
        </footer>
</body>
</html>
